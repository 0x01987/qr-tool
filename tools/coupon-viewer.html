<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Coupon Viewer | InstantQR</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{
      --bg:#0b1220;
      --text:#e7eefc;
      --muted:#a9b7d6;
      --border:rgba(255,255,255,.10);
      --card:#111c34;
      --radius:22px;
      --shadow:0 12px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(105,166,255,.22), transparent 55%),
        radial-gradient(1000px 600px at 85% 15%, rgba(25,195,125,.14), transparent 50%),
        linear-gradient(180deg, var(--bg), #070b14 60%, #060912);
      min-height:100vh;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px;
    }
    .card{
      margin-top:18px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(17,28,52,.96), rgba(12,21,38,.98));
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .hero{
      padding:22px;
      background:linear-gradient(135deg, var(--brand, #2563eb), rgba(10,15,28,.96));
    }
    .badge{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.18);
      font-size:12px;
      font-weight:800;
      color:#fff;
    }
    h1{
      margin:14px 0 8px;
      font-size:clamp(30px, 5vw, 42px);
      line-height:1.05;
    }
    .sub{
      margin:0;
      color:rgba(255,255,255,.88);
      line-height:1.65;
      white-space:pre-wrap;
    }
    .content{
      padding:20px;
      display:grid;
      gap:14px;
    }
    .line{
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      padding:14px;
      line-height:1.7;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .muted{
      color:var(--muted);
    }
    .promo{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.4px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero" id="hero">
        <div class="badge" id="discountType">Offer</div>
        <h1 id="offerTitle">Coupon Viewer</h1>
        <p class="sub" id="discountValue">Open offer details</p>
      </div>
      <div class="content">
        <div class="line promo" id="promoCode">No promo code</div>
        <div class="line" id="couponText">No coupon details found.</div>
        <div class="line muted" id="expiresOn">No expiration date.</div>
        <div class="line muted" id="terms">No terms provided.</div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      function base64UrlDecode(str) {
        const normalized = str.replace(/-/g, '+').replace(/_/g, '/');
        const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('d');

      if (!encoded) return;

      try {
        const decoded = JSON.parse(base64UrlDecode(encoded));

        const offerTitle = decoded.offerTitle || 'Coupon Viewer';
        const themeColor = decoded.themeColor || '#2563eb';
        const promoCode = decoded.promoCode || 'No promo code';
        const discountValue = decoded.discountValue || 'Open offer details';
        const discountType = decoded.discountType || 'Offer';
        const expiresOn = decoded.expiresOn ? 'Expires: ' + decoded.expiresOn : 'No expiration date.';
        const couponText = decoded.couponText || 'No coupon details found.';
        const terms = decoded.terms || 'No terms provided.';

        document.getElementById('offerTitle').textContent = offerTitle;
        document.getElementById('discountType').textContent = discountType;
        document.getElementById('discountValue').textContent = discountValue;
        document.getElementById('promoCode').textContent = promoCode;
        document.getElementById('couponText').textContent = couponText;
        document.getElementById('expiresOn').textContent = expiresOn;
        document.getElementById('terms').textContent = terms;
        document.getElementById('hero').style.setProperty('--brand', themeColor);
        document.title = offerTitle + ' | InstantQR';
      } catch (e) {
        document.getElementById('couponText').textContent = 'Could not load coupon details.';
      }
    })();
  </script>
</body>
</html>
