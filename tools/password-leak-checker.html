<meta charset="utf-8">

<title>Password Leak Checker | InstantQR</title>
<meta name="description" content="Check if your password appears in known breaches using privacy-first k-anonymity.">

<link rel="canonical" href="https://instantqr.io/tools/password-leak-checker.html">
<link rel="stylesheet" href="/assets/site.css">

<link rel="icon" href="/assets/instantqr-logo.svg">

<style>
.tool-grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:18px;
  margin-top:14px;
}

.tool-card{
  padding:24px;
  border-radius:var(--radius2);
  border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(17,28,52,.92), rgba(12,21,38,.96));
}

.tool-panel{
  padding:18px;
  border-radius:var(--radius2);
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.2);
  color:#fff;
}

.status{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.2);
}

.meter{
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
}
.bar{
  height:100%;
  width:0%;
}

@media(max-width:900px){
  .tool-grid{grid-template-columns:1fr;}
}
</style>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">
      <img src="/assets/instantqr-logo.svg">
      <span>InstantQR</span>
    </a>

    <nav class="top-links">
      <a href="/">Home</a>
      <a href="/tools/tools.html">Tools</a>
    </nav>
  </div>
</header>

<main class="wrap">

<nav class="breadcrumb">
  <ol>
    <li><a href="/">Home</a></li>
    <li><a href="/tools/tools.html">Tools</a></li>
    <li>Password Leak Checker</li>
  </ol>
</nav>

<section class="tool-grid">

<!-- LEFT -->
<section class="tool-card">

<div class="pill">🔒 Privacy-First • ⚡ Fast</div>

<h1>Password Leak Checker</h1>
<p class="sub">
Check if your password appears in breach datasets using k-anonymity.
Your full password is never sent.
</p>

<div style="display:flex;gap:10px;margin-top:12px;">
<input id="pw" class="input" type="password" placeholder="Enter password...">
<button class="cta primary" id="checkBtn">Check</button>
</div>

<div style="margin-top:10px;">
<label><input type="checkbox" id="showPw"> Show password</label>
<label style="margin-left:12px;"><input type="checkbox" id="localOnly" checked> Privacy mode</label>
</div>

</section>

<!-- RIGHT -->
<aside class="tool-panel">

<h3>Result</h3>

<div class="status" id="status">
Ready. Enter a password.
</div>

<div style="margin-top:12px;">
<div style="display:flex;justify-content:space-between;">
<span>Strength</span>
<span id="strengthLabel">—</span>
</div>
<div class="meter"><div class="bar" id="bar"></div></div>
</div>

<button class="cta ghost" id="clearBtn" style="margin-top:12px;">Clear</button>

</aside>

</section>

<footer class="footer">
<div class="footer-box">
© <span id="year"></span> InstantQR
</div>
</footer>

</main>

<script src="/assets/site.js" defer></script>
<script src="/assets/js/tools/password-leak-checker.js" defer></script>
