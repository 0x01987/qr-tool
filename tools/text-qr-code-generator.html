<!doctype html>
<html lang="en">
<head>
  <!-- Analytics -->

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config','G-6213N2G8R2',{ anonymize_ip:true });
  </script>

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3460548141741256"
    crossorigin="anonymous"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Text QR Code Generator | Free QR for Text | InstantQR</title>
  <meta name="description" content="Generate a QR code from any text instantly. Free, fast, mobile-friendly text QR code generator with download and copy features." />

  <link rel="canonical" href="https://instantqr.io/tools/text-qr-code-generator.html" />
  <link rel="icon" href="/assets/instantqr-logo.svg" />

  <link rel="stylesheet" href="/assets/site.css" />

  <style>
    .tool-wrap{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:20px;
    }

    .card{
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:var(--radius2);
      padding:20px;
    }

    .field textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      border-radius:14px;
      border:1px solid var(--border);
      background:#13213b;
      color:var(--text);
      padding:14px;
      font:inherit;
    }

    .qr-box{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:300px;
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.04);
    }

    canvas{
      background:#fff;
      border-radius:12px;
      padding:10px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media(max-width:900px){
      .tool-wrap{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">
      <img src="/assets/instantqr-logo.svg" alt="">
      <span>InstantQR</span>
    </a>

    <nav class="top-links">
      <a href="/">Home</a>
      <a href="/tools/tools.html">Tools</a>
      <a href="/tools/url-qr-code-generator.html">URL QR</a>
      <a href="/tools/vcard-qr-code-generator.html">vCard QR</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <h1>Text QR Code Generator</h1>
  <p class="sub">Turn any text into a QR code instantly. Great for notes, messages, WiFi, or sharing information.</p>

  <div class="tool-wrap">

    <!-- INPUT -->
    <div class="card">
      <div class="field">
        <label>Enter text</label>
        <textarea id="textInput" placeholder="Type or paste any text..."></textarea>
      </div>

      <div class="actions">
        <button class="cta primary" id="generateBtn">Generate QR</button>
        <button class="cta ghost" id="sampleBtn">Load Sample</button>
        <button class="cta ghost" id="clearBtn">Clear</button>
      </div>

      <div class="actions">
        <button class="mini-btn" id="copyBtn">Copy Text</button>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="card">
      <h3>QR Preview</h3>

      <div class="qr-box">
        <canvas id="qrCanvas" width="300" height="300"></canvas>
      </div>

      <div class="actions">
        <button class="mini-btn" id="downloadBtn">Download PNG</button>
      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="footer-box">
    <div>© <span id="year"></span> InstantQR</div>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/tools/tools.html">Tools</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script src="/assets/site.js"></script>
<script src="/assets/js/tools/text-qr-code-generator.js"></script>
</body>
</html>
