.grid{display:grid; grid-template-columns: 1fr 1fr; gap:12px}
@media (max-width: 860px){ .grid{grid-template-columns:1fr} }

label{display:block; font-size:13px; color:var(--muted); margin:8px 0 6px}

  display:inline-flex; align-items:center; justify-content:center;

<body>
<header class="topbar">
  <div class="inner">
    <a class="brand" href="/" aria-label="InstantQR Home">

<main class="wrap">

<section class="card">
  <div class="pill">🧩 Dev Tool · 🔒 Runs locally</div>
  <h1>UUID Generator</h1>
  <p class="sub">Generate RFC 4122 UUIDs (v4). Use for IDs, test data, and development.</p>

  <div class="grid">
    <div>
      <label for="count">How many?</label>
      <select id="count" class="input">
        <option value="1">1</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50">50</option>
      </select>

      <div class="row" style="margin-top:10px;">
        <button class="btn primary" id="genBtn" type="button">Generate</button>
        <button class="btn ghost" id="copyBtn" type="button">Copy All</button>
        <button class="btn ghost" id="clearBtn" type="button">Clear</button>
      </div>

      <div class="hr"></div>
      <p class="help">Tip: Uses <span class="mono">crypto.randomUUID()</span> when available with a secure fallback.</p>
    </div>

    <div>
      <label for="out">UUIDs</label>
      <textarea id="out" class="input mono" spellcheck="false" placeholder="Click Generate…"></textarea>
    </div>
  </div>
</section>

<script>
(function(){
  const out = document.getElementById('out');
  const countEl = document.getElementById('count');
  const genBtn = document.getElementById('genBtn');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');

  function uuidv4Fallback(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    bytes[6] = (bytes[6] & 0x0f) | 0x40;
    bytes[8] = (bytes[8] & 0x3f) | 0x80;
    const hex = [...bytes].map(b => b.toString(16).padStart(2,'0'));
    return (
      hex.slice(0,4).join('') + '-' +
      hex.slice(4,6).join('') + '-' +
      hex.slice(6,8).join('') + '-' +
      hex.slice(8,10).join('') + '-' +
      hex.slice(10,16).join('')
    );
  }

  function uuid(){
    if (crypto.randomUUID) return crypto.randomUUID();
    return uuidv4Fallback();
  }

  function generate(){
    const n = parseInt(countEl.value || '1', 10);
    const items = [];
    for(let i=0;i<n;i++) items.push(uuid());
    out.value = items.join('\\n');
    toast('Generated');
  }

  genBtn.addEventListener('click', generate);
  clearBtn.addEventListener('click', () => { out.value=''; toast('Cleared'); });
  copyBtn.addEventListener('click', async () => {
    const v = (out.value || '').trim();
    if(!v){ toast('Nothing to copy'); return; }
    await copyText(v);
  });

  generate();
})();
</script>

  <footer class="footer" aria-label="Footer">
    <div class="small">© <span id="year"></span> InstantQR.io · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a> · <a href="/sitemap.xml">Sitemap</a></div>
  </footer>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => t.classList.remove('show'), 1300);
  }

  async function copyText(text){
    try {
      await navigator.clipboard.writeText(text);
      toast('Copied');
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Copied');
    }
  }
</script>
