<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Internet Speed Test | InstantQR</title>

<meta name="description" content="Run a quick internet speed test directly in your browser. Measure download speed and latency instantly.">

<style>

:root{
--bg:#0b1220;
--text:#e7eefc;
--muted:#a9b7d6;
--brand:#3b82f6;
--border:rgba(255,255,255,.1);
--radius:18px;
--max:1000px;
}

body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#0b1220,#060912);
color:var(--text);
}

.wrap{
max-width:var(--max);
margin:auto;
padding:30px;
text-align:center;
}

.panel{
background:rgba(255,255,255,.04);
border:1px solid var(--border);
border-radius:var(--radius);
padding:30px;
}

h1{
margin-bottom:10px;
}

.sub{
color:var(--muted);
margin-bottom:25px;
}

.metrics{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:25px;
}

.metric h2{
font-size:34px;
margin:5px 0;
}

.metric span{
color:var(--muted);
font-size:14px;
}

button{
padding:12px 22px;
border-radius:999px;
border:0;
background:var(--brand);
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Internet Speed Test</h1>
<p class="sub">Quickly measure your internet download speed and latency.</p>

<div class="panel">

<button onclick="runTest()">Start Speed Test</button>

<div class="metrics">

<div class="metric">
<span>Download</span>
<h2 id="download">—</h2>
<span>Mbps</span>
</div>

<div class="metric">
<span>Ping</span>
<h2 id="ping">—</h2>
<span>ms</span>
</div>

</div>

</div>

</div>

<script>

async function runTest(){

document.getElementById("download").innerText="...";
document.getElementById("ping").innerText="...";


// PING TEST
let pingStart = performance.now();

await fetch("https://speed.cloudflare.com/__down?bytes=10000");

let pingEnd = performance.now();

let ping = Math.round(pingEnd - pingStart);

document.getElementById("ping").innerText = ping;


// DOWNLOAD TEST

const testFile = "https://speed.cloudflare.com/__down?bytes=50000000";

let start = performance.now();

const response = await fetch(testFile);

const reader = response.body.getReader();

let received = 0;

while(true){

const {done,value} = await reader.read();

if(done) break;

received += value.length;

}

let end = performance.now();

let duration = (end-start)/1000;

let bits = received * 8;

let speed = bits / duration / 1000000;

document.getElementById("download").innerText = speed.toFixed(1);

}

</script>

</body>
</html>
