<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Internet Speed Test | InstantQR</title>
<meta name="description" content="Run a quick internet speed test directly in your browser. Measure download speed and latency instantly.">

<link rel="icon" href="/assets/instantqr-logo.svg">

<style>

:root{
--bg:#0b1220;
--text:#e7eefc;
--muted:#a9b7d6;
--brand:#3b82f6;
--border:rgba(255,255,255,.1);
--radius:18px;
--max:1000px;
}

body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#0b1220,#060912);
color:var(--text);
}

.wrap{
max-width:var(--max);
margin:auto;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.sub{
color:var(--muted);
margin-bottom:20px;
}

.panel{
background:rgba(255,255,255,.04);
border:1px solid var(--border);
border-radius:var(--radius);
padding:24px;
text-align:center;
}

.metrics{
display:flex;
justify-content:center;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.metric{
text-align:center;
}

.metric h2{
font-size:34px;
margin:6px 0;
}

.metric span{
color:var(--muted);
font-size:14px;
}

button{
margin-top:20px;
padding:12px 20px;
border-radius:999px;
border:0;
background:var(--brand);
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Internet Speed Test</h1>
<p class="sub">Quickly measure your internet download speed and latency.</p>

<div class="panel">

<button onclick="runTest()">Start Speed Test</button>

<div class="metrics">

<div class="metric">
<span>Download</span>
<h2 id="download">—</h2>
<span>Mbps</span>
</div>

<div class="metric">
<span>Ping</span>
<h2 id="ping">—</h2>
<span>ms</span>
</div>

</div>

</div>

</div>

<script>

async function runTest(){

document.getElementById("download").innerText="Testing...";
document.getElementById("ping").innerText="...";

let start = performance.now();

await fetch("https://speed.hetzner.de/1MB.bin?"+Math.random());

let end = performance.now();

let ping = Math.round(end-start);

document.getElementById("ping").innerText=ping;

let downloadStart = performance.now();

let response = await fetch("https://speed.hetzner.de/10MB.bin?"+Math.random());

let blob = await response.blob();

let downloadEnd = performance.now();

let duration=(downloadEnd-downloadStart)/1000;

let bits=blob.size*8;

let speed=bits/duration/1000000;

document.getElementById("download").innerText=speed.toFixed(1);

}

</script>

</body>
</html>
