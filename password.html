<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password Generator | InstantQR</title>
  <meta name="description" content="Generate strong passwords instantly. No tracking, no accounts." />

  <link rel="stylesheet" href="styles.css" />
  <meta name="robots" content="index,follow" />
</head>

<body>
  <!-- Header (match your site header) -->
  <header class="navbar">
    <div class="container nav-inner">
      <a class="brand" href="./" aria-label="InstantQR Home">
        <span class="brand-text">InstantQR</span>
      </a>

      <nav class="nav">
        <a href="./">QR Tool</a>
        <a class="active" href="./password.html">Password Generator</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="page-title">Password Generator</h1>
        <p class="muted">Generate strong passwords instantly. Everything runs in your browser.</p>

        <div class="tool-card">
          <div class="row">
            <label class="label">
              Length
              <input id="length" type="number" min="6" max="128" value="16" />
            </label>

            <label class="check">
              <input id="lower" type="checkbox" checked />
              Lowercase (a-z)
            </label>

            <label class="check">
              <input id="upper" type="checkbox" checked />
              Uppercase (A-Z)
            </label>

            <label class="check">
              <input id="numbers" type="checkbox" checked />
              Numbers (0-9)
            </label>

            <label class="check">
              <input id="symbols" type="checkbox" />
              Symbols (!@#$…)
            </label>
          </div>

          <div class="row">
            <label class="check">
              <input id="noAmbiguous" type="checkbox" checked />
              Avoid ambiguous (O/0, l/1, I)
            </label>

            <label class="check">
              <input id="noSimilar" type="checkbox" />
              Avoid similar (vv, rn, …)
            </label>
          </div>

          <div class="output">
            <input id="result" type="text" readonly value="" aria-label="Generated password" />
            <button class="btn" id="copyBtn" type="button">Copy</button>
          </div>

          <div class="actions">
            <button class="btn" id="genBtn" type="button">Generate</button>
            <button class="btn-outline" id="regenBtn" type="button">Regenerate</button>
          </div>

          <p class="muted tiny" id="strengthText"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> InstantQR</p>
      <p class="muted">Privacy-first tools.</p>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const elLength = document.getElementById("length");
    const elLower = document.getElementById("lower");
    const elUpper = document.getElementById("upper");
    const elNumbers = document.getElementById("numbers");
    const elSymbols = document.getElementById("symbols");
    const elNoAmbiguous = document.getElementById("noAmbiguous");
    const elNoSimilar = document.getElementById("noSimilar");

    const elResult = document.getElementById("result");
    const elStrength = document.getElementById("strengthText");
    const copyBtn = document.getElementById("copyBtn");

    const LOWER = "abcdefghijklmnopqrstuvwxyz";
    const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const NUMS  = "0123456789";
    const SYMS  = "!@#$%^&*()-_=+[]{};:,.?/|~";

    const AMBIGUOUS = new Set(["O","0","o","I","l","1"]);
    // A light “similar” filter (optional)
    const SIMILAR = new Set(["v","w","m","n","r"]);

    function randInt(max) {
      const a = new Uint32Array(1);
      crypto.getRandomValues(a);
      return a[0] % max;
    }

    function pick(str) {
      return str[randInt(str.length)];
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildCharset() {
      let chars = "";
      if (elLower.checked) chars += LOWER;
      if (elUpper.checked) chars += UPPER;
      if (elNumbers.checked) chars += NUMS;
      if (elSymbols.checked) chars += SYMS;

      if (!chars) return "";

      // Filters
      let filtered = chars.split("");

      if (elNoAmbiguous.checked) {
        filtered = filtered.filter(c => !AMBIGUOUS.has(c));
      }
      if (elNoSimilar.checked) {
        filtered = filtered.filter(c => !SIMILAR.has(c.toLowerCase()));
      }

      // de-dupe
      filtered = Array.from(new Set(filtered));

      return filtered.join("");
    }

    function estimateStrength(length, pools) {
      // rough entropy estimate: log2(pool^length)
      const poolSize = pools;
      if (poolSize <= 1) return { entropy: 0, label: "Weak" };
      const entropy = Math.log2(Math.pow(poolSize, length));

      let label = "Weak";
      if (entropy >= 80) label = "Very strong";
      else if (entropy >= 60) label = "Strong";
      else if (entropy >= 40) label = "Good";
      else if (entropy >= 28) label = "Okay";
      return { entropy, label };
    }

    function generate() {
      const length = Math.max(6, Math.min(128, Number(elLength.value || 16)));
      elLength.value = String(length);

      const charset = buildCharset();
      if (!charset) {
        elResult.value = "";
        elStrength.textContent = "Select at least one character set.";
        return;
      }

      // Ensure at least one char from each selected type (better UX)
      const required = [];
      if (elLower.checked) required.push(pick(elNoAmbiguous.checked ? LOWER.replace(/[OoIl]/g,"") : LOWER));
      if (elUpper.checked) required.push(pick(elNoAmbiguous.checked ? UPPER.replace(/[OI]/g,"") : UPPER));
      if (elNumbers.checked) required.push(pick(elNoAmbiguous.checked ? NUMS.replace(/[01]/g,"") : NUMS));
      if (elSymbols.checked) required.push(pick(SYMS));

      const out = [];
      // Add required first (trim if length smaller)
      for (let i = 0; i < required.length && out.length < length; i++) out.push(required[i]);
      // Fill remaining
      while (out.length < length) out.push(pick(charset));

      shuffle(out);
      elResult.value = out.join("");

      const s = estimateStrength(length, charset.length);
      elStrength.textContent = `Strength: ${s.label} • ~${Math.round(s.entropy)} bits entropy`;
    }

    async function copyToClipboard() {
      const val = elResult.value;
      if (!val) return;
      try {
        await navigator.clipboard.writeText(val);
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
      } catch {
        // fallback
        elResult.select();
        document.execCommand("copy");
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
      }
    }

    document.getElementById("genBtn").addEventListener("click", generate);
    document.getElementById("regenBtn").addEventListener("click", generate);
    copyBtn.addEventListener("click", copyToClipboard);

    // Auto-generate once on load
    generate();
  </script>
</body>
</html>
