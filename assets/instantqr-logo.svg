<svg xmlns="http://www.w3.org/2000/svg" width="980" height="240" viewBox="0 0 980 240" role="img" aria-label="InstantQR logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4cc3ff"></stop>
      <stop offset="1" stop-color="#7c5cff"></stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="200" height="200" rx="54" fill="url(#g)"></rect>
    <!-- QR corners -->
    <g fill="none" stroke="#081018" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <path d="M52 84V52h32"></path>
      <path d="M52 148v32h32"></path>
      <path d="M148 84V52h-32"></path>
    </g>
    <!-- Bolt -->
    <path d="M120 40
             L84 114
             H112
             L94 168
             L156 98
             H126
             Z" fill="#081018" opacity="0.95"></path>
    <!-- Small scan dots -->
    <g fill="#081018" opacity="0.95">
      <circle cx="150" cy="148" r="7"></circle>
      <circle cx="132" cy="170" r="6"></circle>
      <circle cx="166" cy="170" r="6"></circle>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(260,155)">
    <text x="0" y="0" font-family="system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-weight="800" font-size="90" fill="#e8eef7">Instant</text>

    <text x="420" y="0" font-family="system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-weight="900" font-size="90" fill="url(#g)">QR</text>
  </g>
</svg>
